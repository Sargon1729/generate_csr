######################################################################
# OpenSSL req configuration template
# Use with: openssl req -new -key key.pem -out csr.pem -config this.cnf
######################################################################

[ req ]
default_bits        = 2048
default_md          = sha256
distinguished_name  = req_distinguished_name
req_extensions      = v3_req

# Set to "no" to skip prompts and use values below
prompt              = no

# Uncomment if you want to encrypt the private key
# encrypt_key        = yes

######################################################################
# Distinguished Name (DN)
######################################################################
[ req_distinguished_name ]
# Country Name (2 letter code)
C                   = NA

# State or Province Name (full name)
ST                  = NA

# Locality Name (eg, city)
L                   = REDACTED

# Organization Name (eg, company)
O                   = REDACTED

# Organizational Unit Name (eg, section)
OU                  = REDACTED

# Common Name (e.g. FQDN or YOUR name)
CN                  = server2.app.local

# Email Address
#emailAddress        = admin@example.local

# Optional fields (uncomment if needed)
# serialNumber       = 123456789
# title              = IT Department
# description        = Example Certificate

######################################################################
# Request Extensions (for CSR)
######################################################################
[ v3_req ]

# Basic key usage (adjust depending on purpose)
keyUsage = critical, digitalSignature, keyEncipherment

# Extended Key Usage (common values below)
# Server Authentication
#extendedKeyUsage = serverAuth

# Alternatives:
#extendedKeyUsage = clientAuth
 extendedKeyUsage = serverAuth, clientAuth
 extendedKeyUsage = codeSigning
# extendedKeyUsage = emailProtection

# Subject Alternative Names (SAN)
subjectAltName = @alt_names

# Optional extensions
# basicConstraints = CA:FALSE
# subjectKeyIdentifier = hash
# authorityKeyIdentifier = keyid,issuer

######################################################################
# Subject Alternative Names
######################################################################
[ alt_names ]

# DNS names, it seems this is a mandatory field
DNS.1 = server2.app.local
# DNS.2 = www.example.local
# DNS.3 = api.example.local

# IP addresses
# IP.1  = 192.168.1.10
# IP.2  = 10.0.0.5

# Email SAN
# email.1 = admin@example.local

# URI SAN
# URI.1 = https://example.local

######################################################################
# Optional: CA extensions (if generating a self-signed CA)
######################################################################
[ v3_ca ]

# Uncomment if using this config for a CA cert
# subjectKeyIdentifier = hash
# authorityKeyIdentifier = keyid:always,issuer
# basicConstraints = critical, CA:true
# keyUsage = critical, digitalSignature, cRLSign, keyCertSign

######################################################################
# Optional: policy section (mainly for CA usage)
######################################################################
[ policy_match ]

# countryName             = match
# stateOrProvinceName     = match
# organizationName        = match
# organizationalUnitName  = optional
# commonName              = supplied
# emailAddress            = optional
